---
- name: Install unattended-upgrades and needrestart
  ansible.builtin.apt:
    name: "{{ unattended_upgrades_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: unattended_upgrades_install

- name: Ensure config directory exists
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy 20auto-upgrades
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: unattended_upgrades_install

- name: Deploy 50unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  when: unattended_upgrades_install

- name: Restart unattended-upgrades service
  ansible.builtin.systemd:
    name: unattended-upgrades.service
    state: restarted
    daemon_reload: true
    enabled: true
  when: unattended_upgrades_install

- name: Ensure needrestart.conf is present
  ansible.builtin.lineinfile:
    path: /etc/needrestart/needrestart.conf
    regexp: '^#?\$nrconf{restart}'
    line: "$nrconf{restart} = '{{ unattended_upgrades_needrestart_mode }}';"
    create: true
    owner: root
    group: root
    mode: "0644"
  when: unattended_upgrades_install
