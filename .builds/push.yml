---
image: alpine/edge
packages:
  - git
sources:
  - https://git.sr.ht:~the-commits/tjenamors-se-unattended-upgrades
secrets:
  - e3464eed-b716-485b-873c-a785ef7bf68b
environment:
  repo_name: tjenamors-se-unattended-upgrades
  github_username: the-commits
  github_repo: the-commits/tjenamors-se-unattended-upgrades
tasks:
  - push: |
      set +x
      cd "${repo_name}"
      git config user.name "the-commits"
      git config user.email "12031896+the-commits@users.noreply.github.com"

      cat > /tmp/notice.md <<'NOTICE'

> **Do not open issues or pull requests on GitHub** — the mirror there is
> [read-only](https://git.sr.ht/~the-commits/tjenamors-se-unattended-upgrades).
> Please use the [sourcehut issue tracker](https://todo.sr.ht/~the-commits/tjenamors-se-unattended-upgrades)
> and send patches to [~the-commits/tjenamors-se-unattended-upgrades@lists.sr.ht](mailto:~the-commits/tjenamors-se-unattended-upgrades@lists.sr.ht).

NOTICE
      sed -i '2r /tmp/notice.md' README.md
      git add README.md
      git commit -m "chore: add mirror notice (GitHub-only)"

      github_token=$(cat ~/secrets/github_pat)
      github_url=$(printf \
        "https://%s:%s@github.com/%s" \
        "${github_username}" \
        "${github_token}" \
        "${github_repo}")
      git push -f "${github_url}" HEAD:main
